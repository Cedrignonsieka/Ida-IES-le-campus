<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d6efd, #003f88);
      color: white;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: bold;
      margin-bottom: 20px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid white;
      width: 0;
      animation: ecrireTitre 3s steps(10, end) forwards;
    }

    p {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      margin-bottom: 40px;
      min-height: 1.6em;
      white-space: nowrap;
      border-right: 2px solid white;
      padding-right: 5px;
    }

    .btn {
      display: block;
      margin: 12px auto;
      padding: 15px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      border: none;
      border-radius: 8px;
      background-color: #ffffff;
      color: #0d6efd;
      cursor: pointer;
      width: 100%;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #0056b3;
      color: white;
      transform: scale(1.03);
    }

    .btn:focus {
      outline: 3px solid #ffdd57;
      outline-offset: 3px;
    }

    @keyframes ecrireTitre {
      from { width: 0; }
      to { width: 100%; border-right: none; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Bienvenue</h1>

    <!-- TEXTE DYNAMIQUE -->
    <p id="typewriter"></p>

    <a href="accueil.html" class="btn">ACCUEIL</a>
    <a href="souscrire.html" class="btn">SOUSCRIRE</a>
    <a href="mela.html" class="btn">VÉRIFIÉE</a>
  </div>

  <!-- JAVASCRIPT TYPEWRITER -->
  <script>
    const phrases = [
      "Essayer le premier placement 😎",
      "Sécurisez votre avenir 💼",
      "Investissez intelligemment 📈",
      "Commencez dès aujourd’hui 🚀"
    ];

    const textElement = document.getElementById("typewriter");
    let phraseIndex = 0;
    let charIndex = 0;
    let isDeleting = false;

    function typeEffect() {
      const currentPhrase = phrases[phraseIndex];

      if (!isDeleting) {
        textElement.textContent = currentPhrase.slice(0, charIndex + 1);
        charIndex++;

        if (charIndex === currentPhrase.length) {
          setTimeout(() => isDeleting = true, 1500);
        }
      } else {
        textElement.textContent = currentPhrase.slice(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
          isDeleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
        }
      }

      setTimeout(typeEffect, isDeleting ? 50 : 100);
    }

    typeEffect();
  </script>
</body>
</html>
