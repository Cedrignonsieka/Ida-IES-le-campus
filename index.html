
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #007bff;
      color: white;
    }
    .container {
      text-align: center;
      padding: 10px;
      width: 90%;
    }
    h1 {
      font-size: 6vw;
      font-weight: bold;
      margin-bottom: 20px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid white;
      animation: ecrire 5s steps(30, end) infinite;
    }
    p {
      font-size: 3vw;
      margin-bottom: 40px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid white;
      animation: ecrire 5s steps(50, end) infinite;
      animation-delay: 2.5s;
    }
    .btn {
      display: block;
      margin: 10px auto;
      padding: 15px 25px;
      font-size: 4vw;
      border: none;
      border-radius: 8px;
      background-color: #ffffff;
      color: #007bff;
      cursor: pointer;
      transition: background-color 0.3s;
      width: 80%;
    }
    .btn:hover {
      background-color: #0056b3;
      color: white;
    }
    @keyframes ecrire {
      0% { width: 0; }
      50% { width: 100%; border-right: 2px solid white; }
      60% { border-right: none; }
      100% { width: 0; border-right: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bienvenue</h1>
    <p>Essayer le premier placement😎</p>
    <button class="btn">ACCUEIL</button>
    <button class="btn">SOUSCRIRE</button>
    <button class="btn">VÉRIFIÉE</button>
  </div>
</body>
</html>
