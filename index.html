<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Pro</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d6efd 0%, #003f88 100%);
      color: white;
      padding: 20px;
    }

   .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 50px 30px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 20px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid white;
      width: 9ch;
      animation: ecrireTitre 2.5s steps(9, end) forwards;
    }

    p {
      font-size: clamp(1rem, 4vw, 1.4rem);
      margin-bottom: 40px;
      min-height: 2.5em;
      line-height: 1.5;
      opacity: 0.9;
    }

   .btn {
      display: block;
      margin: 15px auto;
      padding: 18px 25px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 600;
      border: none;
      border-radius: 15px;
      background: white;
      color: #0d6efd;
      cursor: pointer;
      width: 100%;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease forwards;
    }

   .btn:nth-child(3) { animation-delay: 0.3s; }
   .btn:nth-child(4) { animation-delay: 0.4s; }
   .btn:nth-child(5) { animation-delay: 0.5s; }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

   .btn:hover {
      background: #ffdd57;
      color: #003f88;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 30px rgba(255, 221, 87, 0.4);
    }

   .btn:active {
      transform: translateY(0) scale(0.98);
    }

   .btn:focus {
      outline: 3px solid #ffdd57;
      outline-offset: 3px;
    }

    @keyframes ecrireTitre {
      from { width: 0; }
      to { width: 9ch; border-right: none; }
    }

   .cursor {
      border-right: 3px solid white;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Bienvenue</h1>

    <p id="typewriter"></p>

    <a href="mela2.html" class="btn">ACCUEIL</a>
    <a href="mela3.html" class="btn">SOUSCRIRE</a>
    <a href="mela.html" class="btn">VÉRIFIÉE</a>
  </div>

  <script>
    const phrases = [
      "Essayer le premier placement 😎",
      "Sécurisez votre avenir 💼",
      "Investissez intelligemment 📈",
      "Commencez dès aujourd’hui 🚀"
    ];

    const textElement = document.getElementById("typewriter");
    let phraseIndex = 0;
    let charIndex = 0;
    let isDeleting = false;

    function typeEffect() {
      const currentPhrase = phrases[phraseIndex];

      if (!isDeleting) {
        textElement.innerHTML = currentPhrase.slice(0, charIndex + 1) + '<span class="cursor"></span>';
        charIndex++;

        if (charIndex === currentPhrase.length) {
          setTimeout(() => isDeleting = true, 2000);
        }
      } else {
        textElement.innerHTML = currentPhrase.slice(0, charIndex - 1) + '<span class="cursor"></span>';
        charIndex--;

        if (charIndex === 0) {
          isDeleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
        }
      }

      setTimeout(typeEffect, isDeleting? 40 : 80);
    }

    // Vibration au clic pour mobile
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if(navigator.vibrate) navigator.vibrate(30);
      });
    });

    typeEffect();
  </script>
</body>
</html>
