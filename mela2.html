<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Feed Boutons</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', sans-serif;
  }

 .feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
  }

 .feed::-webkit-scrollbar { display: none; }

 .slide {
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    position: relative;
  }

 .slide-btn {
    width: 100%;
    height: 100%;
    border: none;
    padding: 0;
    background: none;
    cursor: pointer;
    position: relative;
    display: block;
  }

 .slide-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

 .overlay {
    position: absolute;
    bottom: 80px;
    left: 20px;
    right: 20px;
    color: white;
    text-align: left;
  }

 .overlay h2 {
    font-size: 2rem;
    margin-bottom: 10px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

 .overlay p {
    font-size: 1.1rem;
    opacity: 0.9;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

 .indicator {
    position: fixed;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

 .dot {
    width: 6px;
    height: 30px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    transition: 0.3s;
  }

 .dot.active {
    background: white;
    height: 50px;
  }
</style>
</head>
<body>

<div class="feed" id="feed">
  <div class="slide">
    <button class="slide-btn" data-action="1">
      <img src="https://picsum.photos/400/800?random=10" alt="Produit 1">
      <div class="overlay">
        <h2>Produit 1</h2>
        <p>Appuie pour acheter</p>
      </div>
    </button>
  </div>

  <div class="slide">
    <button class="slide-btn" data-action="2">
      <img src="https://picsum.photos/400/800?random=20" alt="Produit 2">
      <div class="overlay">
        <h2>Produit 2</h2>
        <p>Appuie pour voir détails</p>
      </div>
    </button>
  </div>

  <div class="slide">
    <button class="slide-btn" data-action="3">
      <img src="https://picsum.photos/400/800?random=30" alt="Produit 3">
      <div class="overlay">
        <h2>Produit 3</h2>
        <p>Appuie pour commander</p>
      </div>
    </button>
  </div>
</div>

<div class="indicator">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<script>
const feed = document.getElementById('feed');
const dots = document.querySelectorAll('.dot');
const buttons = document.querySelectorAll('.slide-btn');

// Gestion du clic sur l'image-bouton
buttons.forEach(btn => {
  btn.addEventListener('click', (e) => {
    const action = btn.dataset.action;
    
    // Vibration mobile si dispo
    if(navigator.vibrate) navigator.vibrate(50);
    
    // Ton action ici
    if(action == 1) alert('Produit 1 sélectionné ✅');
    if(action == 2) alert('Produit 2 sélectionné ✅'); 
    if(action == 3) alert('Produit 3 sélectionné ✅');
    
    console.log('Action:', action);
  });
});

// Mise à jour des dots quand on scroll
feed.addEventListener('scroll', () => {
  const slideHeight = window.innerHeight;
  const index = Math.round(feed.scrollTop / slideHeight);
  
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === index);
  });
});
</script>

</body>
</html>
