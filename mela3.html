<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Boutons</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    font-family: Arial, sans-serif;
  }

  .slide {
    position: relative;
    width: 100%;
    height: 100vh;
    margin-bottom: 5px;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .overlay {
    position: absolute;
    bottom: 80px;
    left: 20px;
    color: white;
    font-size: 2rem;
    text-shadow: 2px 2px 5px #000;
    z-index: 2;
  }

  .side-buttons {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 10;
  }

  .side-btn {
    padding: 10px 16px;
    border-radius: 20px;
    border: 2px solid white;
    background: rgba(0,0,0,0.8);
    color: white;
    font-weight: bold;
    font-size: 14px;
    text-decoration: none;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5);
  }

  .side-btn:active {
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

<div class="slide">
  <img src="https://picsum.photos/400/800?random=10" alt="Test 1">
  <div class="overlay">Produit 1</div>
  <div class="side-buttons">
    <button class="side-btn" onclick="alert('Vendre 1')">Vendre</button>
    <button class="side-btn" onclick="alert('Acheter 1')">Acheter</button>
    <a href="index.html" class="side-btn">Accueil</a>
  </div>
</div>

<div class="slide">
  <img src="https://picsum.photos/400/800?random=20" alt="Test 2">
  <div class="overlay">Produit 2</div>
  <div class="side-buttons">
    <button class="side-btn" onclick="alert('Vendre 2')">Vendre</button>
    <button class="side-btn" onclick="alert('Acheter 2')">Acheter</button>
    <a href="index.html" class="side-btn">Accueil</a>
  </div>
</div>

<div class="slide">
  <img src="https://picsum.photos/400/800?random=30" alt="Test 3">
  <div class="overlay">Produit 3</div>
  <div class="side-buttons">
    <button class="side-btn" onclick="alert('Vendre 3')">Vendre</button>
    <button class="side-btn" onclick="alert('Acheter 3')">Acheter</button>
    <a href="index.html" class="side-btn">Accueil</a>
  </div>
</div>

</body> 
</html>
