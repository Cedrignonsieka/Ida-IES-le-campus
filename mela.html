<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Feed + Boutons Latéraux</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', sans-serif;
  }

 .feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
  }

 .feed::-webkit-scrollbar { display: none; }

 .slide {
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    position: relative;
  }

 .slide-btn {
    width: 100%;
    height: 100%;
    border: none;
    padding: 0;
    background: none;
    cursor: pointer;
    position: relative;
    display: block;
  }

 .slide-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

 .overlay {
    position: absolute;
    bottom: 80px;
    left: 20px;
    right: 80px;
    color: white;
    text-align: left;
  }

 .overlay h2 {
    font-size: 2rem;
    margin-bottom: 10px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

 .overlay p {
    font-size: 1.1rem;
    opacity: 0.9;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

 .side-buttons {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 5;
  }

 .side-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid white;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }

 .side-btn:active {
    transform: scale(0.9);
    background: rgba(255,255,255,0.3);
  }

 .indicator {
    position: fixed;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

 .dot {
    width: 6px;
    height: 30px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    transition: 0.3s;
  }

 .dot.active {
    background: white;
    height: 50px;
  }
</style>
</head>
<body>

<div class="feed" id="feed">
  <div class="slide">
    <button class="slide-btn" data-action="main1">
      <img src="https://picsum.photos/400/800?random=10" alt="Produit 1">
      <div class="overlay">
        <h2>Produit 1</h2>
        <p>Appuie sur l'image ou les boutons</p>
      </div>
    </button>
    <div
