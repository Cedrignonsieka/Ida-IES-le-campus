<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nonchalance.exe</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

 .container {
    text-align: center;
    padding: 40px 20px;
    max-width: 600px;
    animation: float 6s ease-in-out infinite;
  }

  h1 {
    font-size: 4rem;
    margin-bottom: 20px;
    font-weight: 300;
    letter-spacing: 2px;
  }

  p {
    font-size: 1.2rem;
    opacity: 0.9;
    margin-bottom: 40px;
    line-height: 1.6;
  }

 .btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid white;
    color: white;
    padding: 15px 40px;
    font-size: 1.1rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

 .btn:hover {
    background: white;
    color: #764ba2;
    transform: scale(1.05);
  }

 .vibe {
    font-size: 5rem;
    margin: 30px 0;
    transition: transform 0.5s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
  }

 .bubbles {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: -1;
  }

 .bubble {
    position: absolute;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    animation: rise 15s infinite;
  }

  @keyframes rise {
    0% { transform: translateY(100vh) scale(0); }
    100% { transform: translateY(-10vh) scale(1); }
  }
</style>
</head>
<body>
<div class="bubbles" id="bubbles"></div>

<div class="container">
  <div class="vibe" id="vibe">😎</div>
  <h1>Nonchalance</h1>
  <p id="text">Le stress? Jamais entendu parler. Respire, glisse, laisse couler.</p>
  <button class="btn" onclick="changerVibe()">Changer de vibe</button>
</div>

<script>
const vibes = [
  { emoji: '😎', text: 'Le stress? Jamais entendu parler. Respire, glisse, laisse couler.' },
  { emoji: '🧘', text: 'Zen attitude activée. On gère ça demain... ou jamais.' },
  { emoji: '🍃', text: 'Comme une feuille au vent. Pas de pression, juste du flow.' },
  { emoji: '🌊', text: 'Mode océan: calme en surface, profond à l\'intérieur.' }
];

let index = 0;

function changerVibe() {
  index = (index + 1) % vibes.length;
  document.getElementById('vibe').textContent = vibes[index].emoji;
  document.getElementById('text').textContent = vibes[index].text;
  document.getElementById('vibe').style.transform = 'scale(1.3) rotate(10deg)';
  setTimeout(() => {
    document.getElementById('vibe').style.transform = 'scale(1) rotate(0deg)';
  }, 500);
}

// Générer des bulles pour l'effet nonchalant
for(let i = 0; i < 15; i++) {
  const bubble = document.createElement('div');
  bubble.classList.add('bubble');
  bubble.style.width = Math.random() * 60 + 20 + 'px';
  bubble.style.height = bubble.style.width;
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.animationDelay = Math.random() * 15 + 's';
  document.getElementById('bubbles').appendChild(bubble);
}
</script>
</body>
</html>
